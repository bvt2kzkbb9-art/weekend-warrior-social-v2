<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#1a1410"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Arena Wojowników — Weekend Warrior Social</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-container">
  <header class="top-bar">
    <h1 class="app-title">⚔️ Arena Wojowników</h1>
    <nav class="top-bar-right">
      <a href="profile.html" class="avatar-btn">👤</a>
    </nav>
  </header>

  <main class="main-content">
    <div class="page-container">
      <section class="hero-section">
        <h2 class="hero-title">Arena Wojowników</h2>
        <p class="hero-subtitle">Dołącz. Walcz. Zwyciężaj.</p>
        <div class="hero-stats">
          <div class="stat-box">
            <div class="stat-value" id="user-level">1</div>
            <div class="stat-label">Poziom</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="user-xp">0</div>
            <div class="stat-label">XP</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="user-rank">Rookie</div>
            <div class="stat-label">Ranga</div>
          </div>
        </div>
      </section>

      <section class="section">
        <h3 class="section-title">🎯 Wyzwania</h3>
        <div class="carousel" id="challenges-carousel"></div>
      </section>

      <section class="section">
        <div class="quick-actions">
          <a href="feed.html" class="action-btn">
            <span class="action-icon">📜</span>
            <span class="action-label">Kroniki</span>
          </a>
          <a href="challenges.html" class="action-btn">
            <span class="action-icon">⚔️</span>
            <span class="action-label">Misje</span>
          </a>
          <a href="ranking.html" class="action-btn">
            <span class="action-icon">🏆</span>
            <span class="action-label">Chwała</span>
          </a>
          <a href="friends.html" class="action-btn">
            <span class="action-icon">🤝</span>
            <span class="action-label">Znajomi</span>
          </a>
        </div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">🏰 Arena</a>
    <a href="feed.html" class="nav-item">📜 Kroniki</a>
    <a href="challenges.html" class="nav-item nav-hero">⚔️ Misje</a>
    <a href="ranking.html" class="nav-item">🏆 Chwała</a>
  </nav>
</div>

<script type="module">
  import { checkAuth } from './js/auth.js';

  checkAuth((user, userData) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    document.getElementById('user-level').textContent = userData?.level || 1;
    document.getElementById('user-xp').textContent = userData?.points || 0;
    document.getElementById('user-rank').textContent = userData?.rank || 'Rookie';
  });
</script>
</body>
</html>
